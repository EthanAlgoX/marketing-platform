services:
  postgres:
    image: postgres:16-alpine
    container_name: marketing-platform-postgres
    environment:
      POSTGRES_USER: marketing
      POSTGRES_PASSWORD: marketing
      POSTGRES_DB: marketing_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: marketing-platform-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    container_name: marketing-platform-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: marketing
      MINIO_ROOT_PASSWORD: marketing-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  redis-data:
  minio-data:
